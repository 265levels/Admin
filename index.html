<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Levels Admin Control Center</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="admin.css"/>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
</head>

<body class="bg-zinc-950 text-white font-sans flex flex-col h-screen">
    <div id="login-overlay" class="fixed inset-0 bg-zinc-950 z-[100] flex flex-col items-center justify-center p-6">
          <h1 class="text-4xl font-black text-red-500 mb-2 tracking-tighter">LEVELS ADMIN</h1>
          <p class="text-zinc-400 mb-8 text-center">Authorized Personnel Only</p>
          <button onclick="login()" class="bg-white text-black px-8 py-3 rounded-full font-bold flex items-center gap-3 hover:bg-zinc-200 transition">
          <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" class="w-5 h-5">
          Sign in with Google
          </button>
          <p id="login-error" class="text-red-500 mt-4 text-sm hidden">Access Denied: Email not authorized.</p>
    </div>

    <!-- FIXED HEADER - Hamburger removed on desktop -->
    <header class="bg-zinc-900 p-4 border-b border-zinc-800 flex justify-between items-center sticky top-0 z-50">
        <h1 class="text-xl font-black text-red-500 tracking-tighter">LEVELS</h1>
        
        <div class="flex items-center gap-4">
            <div id="current-user" class="text-sm text-zinc-400 hidden md:block"></div>

            <!-- Logout Button - Shows ONLY on Desktop -->
            <button onclick="logout()" 
                    class="hidden lg:flex items-center gap-2 px-6 py-2.5 rounded-2xl bg-zinc-800 hover:bg-red-900 hover:text-red-400 text-sm font-medium transition-all">
                <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M17 16l4-4m0 0l-4-4m4 4V7m-4 4V7" />
                </svg>
                Logout
            </button>

            <!-- Hamburger - Shows ONLY on Mobile -->
            <button onclick="toggleMenu()" class="lg:hidden p-3 bg-zinc-800 rounded-xl">
                <svg id="menu-icon" class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16m-7 6h7"></path>
                </svg>
            </button>
        </div>
    </header>

    <div class="flex flex-1 flex-col lg:flex-row overflow-hidden">
        
        <aside id="sidebar" class="hidden lg:flex w-full lg:w-72 bg-zinc-900 p-6 flex-col gap-2 border-r border-zinc-800 absolute lg:relative z-40 h-full transition-all">
            <h1 class="hidden lg:block text-2xl font-black text-red-500 mb-6 tracking-tighter">LEVELS ADMIN</h1>
            <nav class="flex flex-col gap-2">
                <button onclick="switchTabMobile('overview')" class="tab-btn">📊 Overview</button>
                <button onclick="switchTabMobile('clients')" class="tab-btn">👤 Clients</
