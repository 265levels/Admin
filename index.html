<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Levels Admin Control Center</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="admin.css"/>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
</head>

<body class="bg-zinc-950 text-white font-sans">
    <div class="flex h-screen overflow-hidden">
        <aside class="w-72 bg-zinc-900 p-6 flex flex-col gap-2 border-r border-zinc-800">
            <h1 class="text-2xl font-black text-red-500 mb-6 tracking-tighter">LEVELS ADMIN</h1>
            <nav class="flex flex-col gap-2">
                <button onclick="switchTab('overview')" class="tab-btn">📊 Overview</button>
                <button onclick="switchTab('clients')" class="tab-btn">👤 Clients</button>
                <button onclick="switchTab('transactions')" class="tab-btn">💳 Transactions</button>
                <button onclick="switchTab('images')" class="tab-btn">🖼 Image Approval</button>
                <button onclick="switchTab('messages')" class="tab-btn">💬 Messages</button>
            </nav>
        </aside>

        <main class="flex-1 p-8 overflow-y-auto">
            <section id="overview" class="tab-content">
                <h2 class="text-3xl font-bold mb-6">Platform Overview</h2>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div class="card text-center py-10">
                        <span class="text-zinc-400 text-sm uppercase font-semibold tracking-widest">Total Users</span>
                        <p id="total-users" class="text-5xl font-black mt-4 text-red-500">0</p>
                    </div>
                    </div>
            </section>

            <section id="clients" class="tab-content hidden">
                <h2 class="text-2xl font-bold mb-6">Client Management</h2>
                <div id="clients-list" class="space-y-4"></div>
            </section>

            <section id="transactions" class="tab-content hidden">
                <h2 class="text-2xl font-bold mb-6">Transaction Monitor</h2>
                <div id="transactions-list" class="space-y-4"></div>
            </section>

            <section id="images" class="tab-content hidden">
                <h2 class="text-2xl font-bold mb-6">Product Image Approval</h2>
                <div id="image-queue" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
            </section>

            <section id="messages" class="tab-content hidden">
                <h2 class="text-2xl font-bold mb-6">Broadcast Message</h2>
                <div class="bg-zinc-900 p-6 rounded-2xl max-w-lg">
                    <input id="msg-user" placeholder="Recipient Email/ID" class="input mb-4"/>
                    <textarea id="msg-text" placeholder="Write message here..." class="input h-32 mb-4"></textarea>
                    <button onclick="sendMessage()" class="btn w-full hover:bg-red-700 transition">Send Message</button>
                </div>
            </section>
        </main>
    </div>

    <script src="admin.js"></script>
</body>
</html>
