<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Admin Control Center</title>
<link rel="stylesheet" href="admin.css"/>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-zinc-950 text-white">

<div class="flex h-screen overflow-hidden">

<!-- SIDEBAR -->
<aside class="w-72 bg-zinc-900 p-5 flex flex-col gap-4">

    <h1 class="text-2xl font-bold text-red-500">LEVELS ADMIN</h1>

    <button onclick="switchTab('overview')" class="tab-btn">📊 Overview</button>
    <button onclick="switchTab('clients')" class="tab-btn">👤 Clients</button>
    <button onclick="switchTab('transactions')" class="tab-btn">💳 Transactions</button>
    <button onclick="switchTab('images')" class="tab-btn">🖼 Image Approval</button>
    <button onclick="switchTab('messages')" class="tab-btn">💬 Messages</button>
    <button onclick="switchTab('blocked')" class="tab-btn">🚫 Blocked Users</button>
    <button onclick="switchTab('notifications')" class="tab-btn">🔔 Notifications</button>

</aside>

<!-- MAIN -->
<main class="flex-1 p-6 overflow-y-auto">

<!-- OVERVIEW -->
<section id="overview" class="tab">
    <h2 class="text-2xl font-bold mb-4">Platform Overview</h2>

    <div class="grid grid-cols-3 gap-4">

        <div class="card">👥 Users <p id="total-users">0</p></div>
        <div class="card">🛍 Products <p id="total-products">0</p></div>
        <div class="card">💳 Transactions <p id="total-transactions">0</p></div>

        <div class="card">🔥 Active Users <p id="live-users">0</p></div>
        <div class="card">⚠ Reports <p id="reports">0</p></div>
        <div class="card">💰 Revenue <p id="revenue">MWK 0</p></div>

    </div>
</section>

<!-- CLIENTS -->
<section id="clients" class="tab hidden">
    <h2 class="text-xl font-bold mb-4">Client Management</h2>
    <div id="clients-list" class="space-y-3"></div>
</section>

<!-- TRANSACTIONS -->
<section id="transactions" class="tab hidden">
    <h2 class="text-xl font-bold mb-4">Transaction Monitor</h2>
    <div id="transactions-list"></div>
</section>

<!-- IMAGE APPROVAL -->
<section id="images" class="tab hidden">
    <h2 class="text-xl font-bold mb-4">Image Approval Queue</h2>
    <div id="image-queue"></div>
</section>

<!-- MESSAGES -->
<section id="messages" class="tab hidden">
    <h2 class="text-xl font-bold mb-4">Send Message to Client</h2>

    <input id="msg-user" placeholder="User Email or ID" class="input"/>
    <textarea id="msg-text" placeholder="Message..." class="input"></textarea>

    <button onclick="sendMessage()" class="btn">Send Message</button>
</section>

<!-- BLOCKED USERS -->
<section id="blocked" class="tab hidden">
    <h2 class="text-xl font-bold mb-4">Blocked Users</h2>
    <div id="blocked-list"></div>
</section>

<!-- NOTIFICATIONS -->
<section id="notifications" class="tab hidden">
    <h2 class="text-xl font-bold mb-4">System Notifications</h2>
    <div id="notifications-list"></div>
</section>

</main>

</div>

<script src="admin.js"></script>
</body>
</html>
